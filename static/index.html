<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#14110d">
<title>Emberbrook</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
:root{
  --bg:#14110d;--panel:#241d14;--panel2:#2e261a;--border:#6b5138;--ink:#e8dcc3;
  --dim:#a89a80;--gold:#e8b64c;--hp:#c9584a;--green:#7fbf5f;--bad:#c14b3f;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Courier New',ui-monospace,monospace;font-weight:700;color:var(--ink);
  user-select:none;-webkit-user-select:none;touch-action:manipulation;overscroll-behavior:none}
#cv{position:fixed;inset:0;touch-action:none;image-rendering:pixelated;image-rendering:crisp-edges}
/* HUD */
#hud{position:fixed;top:calc(8px + env(safe-area-inset-top));left:8px;z-index:5;pointer-events:none}
.hudbox{background:#1d1a16e6;border:2px solid var(--border);border-radius:6px;padding:6px 8px;min-width:150px}
.hprow{display:flex;align-items:center;gap:6px;font-size:12px}
.hpbar{flex:1;height:10px;background:#00000088;border:1px solid #000;border-radius:3px;overflow:hidden}
#hpfill{height:100%;background:var(--hp);width:100%;transition:width .25s}
.goldrow{margin-top:4px;font-size:13px;color:var(--gold)}
#zone{position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:5;font-size:15px;letter-spacing:2px;color:var(--ink);text-shadow:0 2px 0 #000;
  opacity:0;pointer-events:none}
#zone.go{animation:zonefade 2.6s ease forwards}
@keyframes zonefade{0%{opacity:0;transform:translateX(-50%) translateY(-6px)}15%{opacity:1;transform:translateX(-50%)}75%{opacity:1}100%{opacity:0}}
/* buttons */
#btns{position:fixed;right:8px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:5;display:flex;flex-direction:column;gap:8px}
.hbtn{width:50px;height:50px;border-radius:8px;border:2px solid var(--border);background:#241d14ee;
  color:var(--ink);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hbtn:active{background:var(--panel2);transform:scale(.94)}
/* xp bar */
#xpwrap{position:fixed;left:8px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:5;width:min(220px,50vw);
  background:#1d1a16e6;border:2px solid var(--border);border-radius:6px;padding:5px 8px;font-size:11px;
  opacity:0;transition:opacity .3s;pointer-events:none}
#xpwrap.show{opacity:1}
#xplabel{display:block;margin-bottom:3px}
.bar{height:8px;background:#00000088;border:1px solid #000;border-radius:3px;overflow:hidden}
.bar .fill,#xpfill{height:100%;width:0;transition:width .3s}
#xpnum{display:block;margin-top:2px;color:var(--dim);font-size:10px;text-align:right}
/* toasts */
#toasts{position:fixed;top:calc(46px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:8;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;width:92vw;max-width:380px}
.toast{background:#241d14f2;border:2px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;
  opacity:0;transform:translateY(-8px);transition:all .3s;max-width:100%;text-align:center}
.toast.show{opacity:1;transform:none}
.toast.gold{border-color:var(--gold);color:var(--gold)}
.toast.drop{border-color:#4a6741;color:#bfe0a8}
.toast.bad{border-color:var(--bad);color:#f0b0a5}
/* level flash */
#flash{position:fixed;inset:0;z-index:7;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0}
#flash.go{animation:lflash 1.6s ease forwards}
@keyframes lflash{0%{opacity:0}12%{opacity:1}70%{opacity:1}100%{opacity:0}}
#flash .ring{position:absolute;inset:0;background:radial-gradient(circle,transparent 30%,#e8b64c22 60%,transparent 75%)}
#flashText{font-size:clamp(20px,6vw,32px);color:var(--gold);text-shadow:0 3px 0 #000,0 0 18px #e8b64c88;letter-spacing:1px}
/* panel */
#panel,#dialog{position:fixed;z-index:10;display:none}
#panel.open,#dialog.open{display:flex}
#panel{inset:0;background:#00000088;align-items:center;justify-content:center;padding:14px}
.pbox{background:var(--panel);border:3px solid var(--border);border-radius:10px;width:100%;max-width:420px;
  max-height:82vh;display:flex;flex-direction:column;box-shadow:0 10px 40px #000}
.phead{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:2px solid var(--border);font-size:14px;color:var(--gold)}
#pbody{padding:12px;overflow-y:auto;font-size:13px}
.pclose{background:none;border:2px solid var(--border);color:var(--ink);border-radius:6px;width:34px;height:34px;font-size:16px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.grid.small{grid-template-columns:repeat(6,1fr)}
.slot{position:relative;aspect-ratio:1;background:var(--panel2);border:2px solid var(--border);border-radius:6px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.slot:active{background:#3a3022}
.slot.empty{opacity:.35;cursor:default}
.slot img{width:70%;height:70%;image-rendering:pixelated}
.slot .qty{position:absolute;bottom:1px;right:3px;font-size:10px;color:var(--gold);text-shadow:0 1px 0 #000}
.iteminfo{min-height:22px;color:var(--dim);font-size:12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.equiprow{display:flex;gap:8px;border-top:2px solid var(--border);padding-top:10px}
.equip{flex:1;background:var(--panel2);border:2px solid var(--border);border-radius:6px;padding:6px;text-align:center;font-size:10px;color:var(--dim)}
.equip img{width:28px;height:28px;image-rendering:pixelated;display:block;margin:0 auto 3px}
.skillrow{margin-bottom:12px}
.skillname{display:inline-block;font-size:13px}
.skilllvl{float:right;color:var(--gold);font-size:14px}
.skillrow .bar{margin-top:5px}
.skillrow .xpnum{color:var(--dim);font-size:10px;text-align:right;margin-top:2px}
.sect{color:var(--gold);font-size:12px;letter-spacing:1px;margin:10px 0 6px;text-transform:uppercase}
.sect:first-child{margin-top:0}
.qrow{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--panel2);
  border:2px solid var(--border);border-radius:6px;padding:7px 9px;margin-bottom:6px;font-size:12px}
.qrow.dim{opacity:.5}
.qrow .mini{width:18px;height:18px;image-rendering:pixelated;vertical-align:-4px}
.tag{font-size:10px;color:var(--dim);white-space:nowrap}
.tag.active{color:var(--gold)}
.tag.ready{color:var(--green)}
.tag.done{color:var(--green)}
.tag.locked{color:#7a6c58}
.btn{background:var(--panel2);border:2px solid var(--border);color:var(--ink);border-radius:6px;
  padding:9px 12px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;width:100%}
.btn:active{background:#3a3022}
.btn.small{width:auto;padding:6px 10px;font-size:11px}
.btn.danger{border-color:var(--bad);color:#f0b0a5}
.btn.dim{opacity:.5}
.hint{color:var(--dim);font-size:11px;margin-top:8px;line-height:1.5}
/* dialog bottom sheet */
#dialog{left:0;right:0;bottom:0;padding:10px;padding-bottom:calc(10px + env(safe-area-inset-bottom));justify-content:center}
.dbox{background:var(--panel);border:3px solid var(--border);border-radius:10px;width:100%;max-width:420px;padding:12px;box-shadow:0 -6px 30px #000}
#dname{color:var(--gold);font-size:14px;margin-bottom:6px}
#dtext{font-size:13px;line-height:1.5;margin-bottom:10px;color:var(--ink)}
#dopts{display:flex;flex-direction:column;gap:6px}
.dopt{text-align:left}
#dclose{position:absolute;right:18px;top:8px;display:none}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
/* v2 additions */
.equipgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.eqslot{background:var(--panel2);border:2px solid var(--border);border-radius:6px;padding:8px;display:flex;align-items:center;gap:8px;font-size:11px;cursor:pointer;min-height:46px}
.eqslot img{width:26px;height:26px;image-rendering:pixelated;flex:none}
.eqslot.empty{opacity:.4;cursor:default;justify-content:center;color:var(--dim)}
.eqslot:active{background:#3a3022}
.stylerow{display:flex;gap:6px;margin-bottom:8px}
.stylerow .btn{flex:1}
.btn.sel{border-color:var(--gold);color:var(--gold)}
.statline{color:var(--dim);font-size:11px;margin-bottom:8px;text-align:center}
.tokinput{width:100%;background:#00000066;border:2px solid var(--border);border-radius:6px;color:var(--ink);font-family:inherit;font-size:12px;padding:8px;margin-bottom:8px}
.tag.gold{color:var(--gold);border:1px solid var(--border);border-radius:4px;padding:1px 5px}
#stylebtn{font-size:18px}
#ammo{position:fixed;left:8px;bottom:calc(64px + env(safe-area-inset-bottom));z-index:5;background:#1d1a16e6;border:2px solid var(--border);border-radius:6px;padding:4px 9px;font-size:12px;color:var(--ink);display:none}
/* ⚡ special attack + 🍖 quick-eat (left combat cluster) */
#bSpec{position:fixed;left:8px;bottom:calc(104px + env(safe-area-inset-bottom));z-index:5;
  width:58px;height:58px;border-radius:50%;border:3px solid var(--border);background:#241d14ee;
  color:var(--ink);font-size:24px;cursor:pointer;overflow:hidden;padding:0}
#bSpec span{position:relative;z-index:2;text-shadow:0 2px 0 #000}
#specfill{position:absolute;left:0;bottom:0;width:100%;height:100%;background:#e8b64c44;z-index:1;transition:height .2s linear}
#bSpec.ready{border-color:var(--gold);box-shadow:0 0 12px #e8b64c88}
#bSpec.ready #specfill{background:#e8b64c66}
#bSpec:active{transform:scale(.93)}
#bFood{position:fixed;left:74px;bottom:calc(110px + env(safe-area-inset-bottom));z-index:5;
  width:46px;height:46px;border-radius:50%;border:2px solid var(--border);background:#241d14ee;
  color:var(--ink);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#bFood:active{transform:scale(.93)}
#foodqty{position:absolute;bottom:0;right:2px;font-size:10px;color:var(--gold);text-shadow:0 1px 0 #000}
/* minimap (toggled open) */
#minimap{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;background:#000000aa;padding:16px}
#minimap.open{display:flex}
.mmbox{background:var(--panel);border:3px solid var(--border);border-radius:10px;padding:12px;
  max-width:94vw;max-height:88vh;display:flex;flex-direction:column;gap:8px;box-shadow:0 10px 40px #000}
.mmhead{display:flex;justify-content:space-between;align-items:baseline;gap:18px;color:var(--gold);font-size:14px;letter-spacing:1px}
.mmhead .mmhint{color:var(--dim);font-size:10px;letter-spacing:0}
#mmcv{image-rendering:pixelated;border:2px solid var(--border);border-radius:6px;background:#14110d;display:block;max-width:100%}
/* rare-drop popup (non-blocking banner; deluxe adds a screen dim) */
#popdim{position:fixed;inset:0;z-index:7;background:#000;opacity:0;pointer-events:none;transition:opacity .3s}
#popdim.go{opacity:.55}
#itempop{position:fixed;left:50%;top:36%;z-index:8;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 24px;
  background:#1d1a16f2;border:3px solid var(--border);border-radius:12px;box-shadow:0 8px 40px #000;
  opacity:0;pointer-events:none;text-align:center;min-width:180px}
#itempop.go{animation:itempop 2.2s cubic-bezier(.2,.9,.3,1) forwards}
#itempop.deluxe{border-width:4px;padding:18px 30px}
@keyframes itempop{0%{opacity:0;transform:translate(-50%,-50%) scale(.65)}
  12%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}22%{transform:translate(-50%,-50%) scale(1)}
  82%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-58%) scale(1)}}
#itempopIcon{width:56px;height:56px;image-rendering:pixelated}
#itempop.deluxe #itempopIcon{width:72px;height:72px}
#itempopName{font-size:16px;font-weight:700;text-shadow:0 2px 0 #000,0 0 14px currentColor}
#itempopKind{font-size:10px;color:var(--dim);letter-spacing:3px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud"><div class="hudbox">
  <div class="hprow">❤️<div class="hpbar"><div id="hpfill"></div></div><span id="hptext">12/12</span></div>
  <div class="goldrow">🪙 <span id="gold">0</span></div>
</div></div>
<div id="zone"></div>
<div id="toasts"></div>
<div id="flash"><div class="ring"></div><span id="flashText"></span></div>
<div id="popdim"></div>
<div id="itempop"><img id="itempopIcon" alt=""><div id="itempopName"></div><div id="itempopKind"></div></div>
<div id="ammo"></div>
<button id="bSpec" aria-label="Special attack"><div id="specfill"></div><span>⚡</span></button>
<button id="bFood" aria-label="Quick eat" style="display:none">🍖<span id="foodqty"></span></button>
<div id="xpwrap"><span id="xplabel"></span><div class="bar"><div id="xpfill"></div></div><span id="xpnum"></span></div>
<div id="btns">
  <button class="hbtn" id="bInv" aria-label="Inventory">🎒</button>
  <button class="hbtn" id="bEquip" aria-label="Equipment">⚔️</button>
  <button class="hbtn" id="bSkills" aria-label="Skills">📖</button>
  <button class="hbtn" id="bQuests" aria-label="Quests">📜</button>
  <button class="hbtn" id="bBestiary" aria-label="Bestiary">🐾</button>
  <button class="hbtn" id="bMap" aria-label="Map">🗺️</button>
  <button class="hbtn" id="bTravel" aria-label="Travel">🏠</button>
  <button class="hbtn" id="bGear" aria-label="Settings">⚙️</button>
  <button class="hbtn" id="stylebtn" aria-label="Combat style">🎯</button>
</div>
<div id="panel"><div class="pbox">
  <div class="phead"><span id="ptitle"></span><button class="pclose" id="pclose">✕</button></div>
  <div id="pbody"></div>
</div></div>
<div id="dialog"><div class="dbox">
  <div id="dname"></div><div id="dtext"></div><div id="dopts"></div>
  <button id="dclose"></button>
</div></div>
<div id="minimap"><div class="mmbox">
  <div class="mmhead"><span id="mmlabel"></span><span class="mmhint">tap to close</span></div>
  <canvas id="mmcv"></canvas>
</div></div>
<script src="/game.js?v=3.2.0"></script>
</body>
</html>
